services:
  wrapper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sqlite3_gd_wrapper
    environment:
      # LLM Configuration - point to your external LLM service
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-http://host.docker.internal:8080/v1}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-none}"
      WRAPPER_MODEL: "${WRAPPER_MODEL:-gpt-4.1}"

      # Processing Configuration
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    volumes:
      # Mount the sqlite3.gd directory for header files and output
      - ./sqlite3.gd:/app/sqlite3.gd:rw
    working_dir: /app
    # Command is fully overridable, uses default from Dockerfile if not specified
    # Example override:
    # command: ["src/main.py", "path/to/header.h", "-o", "output/", "--workers", "2"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
